<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7EC8F8"/>
      <stop offset="100%" stop-color="#2680C2"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#7BC47F"/>
      <stop offset="100%" stop-color="#27AE3B"/>
    </linearGradient>
    <linearGradient id="red" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#E06060"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
  </defs>

  <!-- Three curved arrows forming a rotating triangle -->
  <g transform="translate(48, 50) scale(0.9)">
    <!-- Blue arrow (top, going right and curving down) -->
    <path d="M-8,-35 Q-30,-30 -30,-5" stroke="url(#blue)" stroke-width="7" stroke-linecap="round" fill="none"/>
    <polygon points="-8,-35 -4,-24 -16,-26" fill="url(#blue)"/>

    <!-- Green arrow (right, going down-left) -->
    <path d="M16,-24 Q32,-8 18,18" stroke="url(#green)" stroke-width="7" stroke-linecap="round" fill="none"/>
    <polygon points="16,-24 22,-14 10,-16" fill="url(#green)"/>

    <!-- Red arrow (bottom-left, going up) -->
    <path d="M-18,24 Q-4,34 18,18" stroke="url(#red)" stroke-width="7" stroke-linecap="round" fill="none" transform="rotate(-10, 0, 20)"/>
    <polygon points="-20,20 -12,28 -24,28" fill="url(#red)"/>
  </g>

  <!-- Company name -->
  <text x="100" y="62" font-family="'Georgia', 'Palatino', serif" font-size="42" font-weight="700" letter-spacing="3" fill="currentColor">3GENYAPI</text>
</svg>
