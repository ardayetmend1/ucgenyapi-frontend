name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 85.159.64.226
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/var/www/ucgenyapi"
          strip_components: 1
          overwrite: true

      - name: Fix permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 85.159.64.226
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: chown -R www-data:www-data /var/www/ucgenyapi
